version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080
    environment:
      ENVIRONMENT: development
      FARM_TEST_MODE: "true"
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m runtime.worker_service
    environment:
      ENVIRONMENT: development
      FARM_TEST_MODE: "true"
      PORT: "8080"
      QUEUE_NAME: default
    volumes:
      - .:/app
